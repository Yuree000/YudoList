services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yudolist-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/yudolist.db
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    volumes:
      - db_data:/data
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yudolist-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app

volumes:
  db_data:

networks:
  app:
    driver: bridge
